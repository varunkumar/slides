      <div style="background: #AAA; margin: 10px 0px;">
        <h2 style="display: inline">
          {slides}.varunkumar.me
        </h2>
        <span style="float: right;margin-top: 5px;margin-right: 15px;font-size: 10pt;font-weight: bold;"><a href="http://www.varunkumar.me">Home</a></span>
      </div>
      <ul>
        <li>
          <span>[18-Jul-2012]</span> <a href="/node-friends" target="_blank">Node.js and friends</a></span>

      <div id="timeline" style="background: rgb(212, 227, 253);border: 10px solid #AAA;"></div>
    </center>
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.2/jquery.min.js"></script>
    <script type="text/javascript" src="chronoline/jquery.qtip.min.js"></script>
    <script type="text/javascript" src="chronoline/raphael-min.js"></script>
    <script type="text/javascript" src="chronoline/chronoline.js"></script>
    <script type="text/javascript">
      $(document).ready(function(){

          var events = [
            {dates: [new Date(2012, 6, 18)], title: "Node.js and friends", section: 0},
            {dates: [new Date(2012, 9, 20)], title: "Tools for debugging JavaScript", section: 3},
            {dates: [new Date(2012, 11, 7)], title: "Do more with JavaScript tools", section: 3}
          ];

          var timeline1 = new Chronoline(document.getElementById('timeline'), events,
              {visibleSpan: DAY_IN_MILLISECONDS * 366,
             animated: true,
             tooltips: true,
             startDate: new Date(2011, 0, 1),
             defaultStartDate: new Date(2012, 0, 1),
             endDate: new Date(2014, 0, 1),
             sectionLabelAttrs: {'fill': '#997e3d', 'font-weight': 'bold'},
             scrollable: true,
             scrollLeft: prevMonth,
             scrollRight: nextMonth,
             draggable: true,
             labelInterval: isHalfMonth,
             markToday: false
          });

          });
    </script>
